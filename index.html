<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Jomiloju! 🎉</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        .hero-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        
        .hero-background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            filter: brightness(0.8) saturate(1.1);
            animation: slowZoom 25s ease-in-out infinite alternate;
        }
        
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }
        
        .hero-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(255, 215, 0, 0.15) 0%, rgba(106, 13, 173, 0.3) 100%);
            z-index: -1;
            backdrop-filter: blur(2px);
        }
        
        .floating-cakes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .floating-cakes span {
            position: absolute;
            color: rgba(255, 215, 0, 0.2);
            font-size: 3rem;
            animation: floatCake 15s linear infinite;
            text-shadow: 0 0 20px rgba(255,215,0,0.2);
        }
        
        @keyframes floatCake {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(1);
                opacity: 0;
            }
            20% {
                opacity: 0.4;
            }
            80% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-100px) rotate(360deg) scale(1.5);
                opacity: 0;
            }
        }
        
        .container {
            max-width: 900px;
            width: 100%;
            position: relative;
            z-index: 2;
            text-align: center;
            animation: fadeIn 1.5s ease;
        }
        
        .birthday-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 60px 40px;
            border: 3px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .birthday-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #ffd700, #8a2be2, #ff69b4, #ffd700);
            background-size: 400% 400%;
            border-radius: 62px;
            z-index: -1;
            animation: gradientBorder 6s ease infinite;
            opacity: 0.6;
        }
        
        @keyframes gradientBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .birthday-header {
            margin-bottom: 40px;
        }
        
        .birthday-header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 5.5rem;
            background: linear-gradient(45deg, #ffd700, #8a2be2, #ff69b4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            animation: glowText 3s ease-in-out infinite;
        }
        
        @keyframes glowText {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(255,215,0,0.3)); }
            50% { filter: drop-shadow(0 0 30px rgba(255,215,0,0.6)); }
        }
        
        .birthday-header h2 {
            font-size: 2rem;
            color: white;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
        }
        
        .cake-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 50px 0;
            flex-wrap: wrap;
        }
        
        .cake {
            font-size: 5rem;
            animation: bounce 2s ease-in-out infinite;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .cake:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 15px 25px rgba(255,215,0,0.5));
        }
        
        .cake:nth-child(1) { animation-delay: 0s; }
        .cake:nth-child(2) { animation-delay: 0.3s; }
        .cake:nth-child(3) { animation-delay: 0.6s; }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .message {
            margin: 40px 0;
            padding: 20px;
        }
        
        .message p {
            color: white;
            font-size: 1.3rem;
            line-height: 1.8;
            font-family: 'Dancing Script', cursive;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }
        
        .surprise-button {
            position: relative;
            margin: 30px 0 20px;
        }
        
        .btn-surprise {
            background: linear-gradient(45deg, #ffd700, #8a2be2);
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: 600;
            padding: 20px 50px;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            font-family: 'Dancing Script', cursive;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-surprise::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-surprise:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.5);
        }
        
        .btn-surprise:hover::before {
            left: 100%;
        }
        
        .btn-surprise:active {
            transform: scale(0.95);
        }
        
        .enter-homepage {
            margin-top: 30px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }
        
        .enter-homepage.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .enter-link {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 600;
            border: 2px solid #ffd700;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .enter-link:hover {
            background: #ffd700;
            color: #4a1b6d;
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }
        
        .candles {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .candle {
            width: 10px;
            height: 40px;
            background: linear-gradient(to top, #f9f9f9, #fff);
            border-radius: 5px 5px 0 0;
            position: relative;
            animation: flicker 2s ease-in-out infinite;
        }
        
        .candle::before {
            content: '🔥';
            position: absolute;
            top: -25px;
            left: -8px;
            font-size: 1.2rem;
            animation: flame 0.5s ease-in-out infinite alternate;
        }
        
        .candle:nth-child(1) { animation-delay: 0s; }
        .candle:nth-child(2) { animation-delay: 0.2s; }
        .candle:nth-child(3) { animation-delay: 0.4s; }
        .candle:nth-child(4) { animation-delay: 0.6s; }
        .candle:nth-child(5) { animation-delay: 0.8s; }
        
        @keyframes flame {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(1.2) translateY(-5px); opacity: 0.9; }
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }
        
        #confetti-canvas.show {
            display: block;
        }
        
        @media (max-width: 768px) {
            .birthday-header h1 {
                font-size: 4rem;
            }
            
            .birthday-header h2 {
                font-size: 1.5rem;
            }
            
            .btn-surprise {
                font-size: 1.5rem;
                padding: 15px 30px;
            }
            
            .cake {
                font-size: 4rem;
            }
        }
        
        @media (max-width: 480px) {
            .birthday-header h1 {
                font-size: 3rem;
            }
            
            .cake-container {
                gap: 15px;
            }
            
            .cake {
                font-size: 3rem;
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="hero-background">
        <img src="image/bg1.jpeg" alt="Dreamy background with gold and purple hues">
    </div>
    <div class="hero-overlay"></div>
    
    <canvas id="confetti-canvas"></canvas>
    
    <div class="floating-cakes">
        <span style="left: 5%; animation-delay: 0s;">🎂</span>
        <span style="left: 15%; animation-delay: 2s;">🎂</span>
        <span style="left: 25%; animation-delay: 4s;">🎂</span>
        <span style="left: 35%; animation-delay: 1s;">🎂</span>
        <span style="left: 45%; animation-delay: 3s;">🎂</span>
        <span style="left: 55%; animation-delay: 5s;">🎂</span>
        <span style="left: 65%; animation-delay: 2.5s;">🎂</span>
        <span style="left: 75%; animation-delay: 4.5s;">🎂</span>
        <span style="left: 85%; animation-delay: 1.5s;">🎂</span>
        <span style="left: 95%; animation-delay: 3.5s;">🎂</span>
    </div>
    
    <div class="container">
        <div class="birthday-card">
            <div class="birthday-header">
                <h1>Happy Birthday</h1>
                <h2>Jomiloju! 🎉</h2>
            </div>
            
            <div class="cake-container">
                <div class="cake">🎂</div>
                <div class="cake">🍰</div>
                <div class="cake">🎂</div>
            </div>
            
            <div class="message">
                <p>Today is all about celebrating you</p>
                <div class="candles">
                    <div class="candle"></div>
                    <div class="candle"></div>
                    <div class="candle"></div>
                    <div class="candle"></div>
                    <div class="candle"></div>
                </div>
            </div>
            
            <div class="surprise-button">
                <button class="btn-surprise" onclick="celebrate()">✨ Birthday Surprise ✨</button>
            </div>
            
            <div class="enter-homepage" id="enterHomepage">
                <a href="about.html" class="enter-link">Enter Your Birthday World →</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script>
        function celebrate() {
            const canvas = document.getElementById('confetti-canvas');
            canvas.classList.add('show');
            
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#ffd700', '#8a2be2', '#ff69b4', '#ffffff', '#4a1b6d']
            });
            
            setTimeout(() => {
                confetti({
                    particleCount: 100,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.8 },
                    colors: ['#ffd700', '#8a2be2', '#ff69b4']
                });
            }, 250);
            
            setTimeout(() => {
                confetti({
                    particleCount: 100,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.8 },
                    colors: ['#ffd700', '#8a2be2', '#ff69b4']
                });
            }, 500);
            
            setTimeout(() => {
                confetti({
                    particleCount: 200,
                    spread: 100,
                    origin: { y: 0.5 },
                    startVelocity: 30,
                    colors: ['#ffd700', '#8a2be2', '#ff69b4', '#ffffff']
                });
            }, 750);
            
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    confetti({
                        particleCount: 80,
                        spread: 120,
                        origin: { x: Math.random(), y: Math.random() * 0.6 },
                        colors: ['#ffd700', '#8a2be2', '#ff69b4', '#ffffff']
                    });
                }, i * 300 + 1000);
            }
            
            setTimeout(() => {
                document.getElementById('enterHomepage').classList.add('show');
            }, 2000);
            
            const message = document.createElement('div');
            message.innerHTML = '🎉🎂🥳';
            message.style.position = 'fixed';
            message.style.top = '50%';
            message.style.left = '50%';
            message.style.transform = 'translate(-50%, -50%)';
            message.style.fontSize = '5rem';
            message.style.zIndex = '10000';
            message.style.pointerEvents = 'none';
            message.style.animation = 'fadeOut 2s forwards';
            message.style.textShadow = '0 0 20px gold';
            document.body.appendChild(message);
            
            setTimeout(() => {
                message.remove();
            }, 2000);
        }
        
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeOut {
                0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
                100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
            }
        `;
        document.head.appendChild(style);
        
        document.querySelectorAll('.floating-cakes span').forEach((span, index) => {
            span.style.animationDuration = `${10 + Math.random() * 15}s`;
        });
    </script>
</body>
</html>
