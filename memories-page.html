<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Core Memories Gallery 💫</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&family=Quicksand:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            padding: 20px;
            position: relative;
            background: linear-gradient(135deg, #1a0b2e 0%, #2d1b45 100%);
        }
        
        /* Animated background */
        .gallery-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .gallery-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: radial-gradient(circle, rgba(255,215,0,0.1) 0%, rgba(106,13,173,0.2) 50%, rgba(0,0,0,0.8) 100%);
            animation: rotate 30s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .floating-frames {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .floating-frames span {
            position: absolute;
            color: rgba(255, 215, 0, 0.08);
            font-size: 3rem;
            animation: floatFrame 12s linear infinite;
        }
        
        @keyframes floatFrame {
            0% { transform: translateY(100vh) rotate(0deg) scale(0.5); opacity: 0; }
            20% { opacity: 0.3; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-100px) rotate(360deg) scale(1.5); opacity: 0; }
        }
        
        .container {
            max-width: 1400px;
            width: 100%;
            position: relative;
            z-index: 2;
            margin: 40px auto;
        }
        
        .back-home {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            border: 2px solid rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .back-home:hover {
            transform: scale(1.05);
            background: rgba(255, 215, 0, 0.25);
            border-color: #ffd700;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }
        
        .header-section {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease;
        }
        
        .header-section h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4.5rem;
            background: linear-gradient(45deg, #ffd700, #8a2be2, #ff69b4, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
        }
        
        .header-section .subtitle {
            color: white;
            font-size: 1.3rem;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            padding: 10px 30px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }
        
        /* Memory Card with Image */
        .memory-card {
            position: relative;
            border-radius: 25px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1/1;
            border: 3px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 1s ease backwards;
        }
        
        .memory-card:nth-child(3n+1) { animation-delay: 0.1s; }
        .memory-card:nth-child(3n+2) { animation-delay: 0.2s; }
        .memory-card:nth-child(3n+3) { animation-delay: 0.3s; }
        
        /* Image container */
        .card-image {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 0.8s ease;
        }
        
        /* Gradient overlay */
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to top, 
                rgba(0,0,0,0.9) 0%, 
                rgba(106,13,173,0.4) 50%, 
                rgba(255,215,0,0.2) 100%);
            opacity: 0.8;
            transition: opacity 0.4s ease;
            z-index: 1;
        }
        
        /* Memory number badge */
        .memory-number {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 45px;
            height: 45px;
            background: rgba(255, 215, 0, 0.95);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #4a1b6d;
            border: 3px solid white;
            z-index: 3;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            backdrop-filter: blur(2px);
        }
        
        /* Memory content that appears on hover */
        .memory-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 25px 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            transform: translateY(100%);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
            border-top: 3px solid #ffd700;
        }
        
        .memory-card:hover .memory-content {
            transform: translateY(0);
        }
        
        .memory-text {
            color: white;
            font-size: 0.95rem;
            line-height: 1.6;
            font-family: 'Quicksand', sans-serif;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .memory-emoji {
            font-size: 1.8rem;
            text-align: right;
            filter: drop-shadow(0 0 10px gold);
        }
        
        /* Hover effects */
        .memory-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: #ffd700;
            box-shadow: 0 30px 50px rgba(255, 215, 0, 0.4);
        }
        
        .memory-card:hover .card-image img {
            transform: scale(1.15);
        }
        
        .memory-card:hover .card-overlay {
            opacity: 0.4;
        }
        
        /* Gold border animation */
        .memory-card::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            background: linear-gradient(45deg, #ffd700, #8a2be2, #ff69b4, #ffd700);
            background-size: 300% 300%;
            border-radius: 28px;
            opacity: 0;
            z-index: -1;
            animation: borderGlow 4s ease infinite;
            transition: opacity 0.4s ease;
        }
        
        .memory-card:hover::before {
            opacity: 1;
        }
        
        @keyframes borderGlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        
        /* Special animation for cards */
        .memory-card {
            position: relative;
        }
        
        .memory-card::after {
            content: '📸';
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 1.5rem;
            color: rgba(255, 215, 0, 0.8);
            z-index: 3;
            filter: drop-shadow(0 0 5px black);
            animation: cameraClick 3s ease infinite;
        }
        
        @keyframes cameraClick {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        
        /* Lightbox effect for clicked images */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .lightbox.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .lightbox-content {
            max-width: 800px;
            width: 90%;
            position: relative;
            animation: zoomIn 0.4s ease;
        }
        
        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .lightbox-image {
            width: 100%;
            border-radius: 20px;
            border: 4px solid #ffd700;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }
        
        .lightbox-caption {
            position: absolute;
            bottom: -60px;
            left: 0;
            right: 0;
            color: white;
            text-align: center;
            font-size: 1.2rem;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            border: 1px solid #ffd700;
        }
        
        .close-lightbox {
            position: absolute;
            top: -50px;
            right: 0;
            background: rgba(255,215,0,0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            border: 2px solid #ffd700;
            transition: all 0.3s ease;
        }
        
        .close-lightbox:hover {
            background: #ffd700;
            color: #4a1b6d;
            transform: rotate(90deg);
        }
        
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,215,0,0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            border: 2px solid #ffd700;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover {
            background: #ffd700;
            color: #4a1b6d;
        }
        
        .nav-btn.prev {
            left: -70px;
        }
        
        .nav-btn.next {
            right: -70px;
        }
        
        .footer-message {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            animation: fadeInUp 1s ease 0.8s backwards;
        }
        
        .footer-message p {
            color: white;
            font-size: 1.5rem;
            font-family: 'Dancing Script', cursive;
        }
        
        .footer-message span {
            color: #ffd700;
            font-size: 2.5rem;
            display: block;
            margin-top: 15px;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .header-section h1 {
                font-size: 3.5rem;
            }
            
            .back-home {
                top: 10px;
                left: 10px;
                padding: 8px 16px;
                font-size: 0.9rem;
            }
            
            .nav-btn.prev {
                left: 10px;
            }
            
            .nav-btn.next {
                right: 10px;
            }
            
            .lightbox-caption {
                bottom: -80px;
                font-size: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            .header-section h1 {
                font-size: 2.5rem;
            }
            
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="gallery-bg"></div>
    
    <div class="floating-frames">
        <span style="left: 5%; animation-delay: 0s;">🖼️</span>
        <span style="left: 15%; animation-delay: 2s;">📸</span>
        <span style="left: 25%; animation-delay: 4s;">🎞️</span>
        <span style="left: 35%; animation-delay: 1s;">📷</span>
        <span style="left: 45%; animation-delay: 3s;">🖼️</span>
        <span style="left: 55%; animation-delay: 5s;">📸</span>
        <span style="left: 65%; animation-delay: 2.5s;">🎞️</span>
        <span style="left: 75%; animation-delay: 4.5s;">📷</span>
        <span style="left: 85%; animation-delay: 1.5s;">🖼️</span>
        <span style="left: 95%; animation-delay: 3.5s;">📸</span>
    </div>
    
    <a href="about.html" class="back-home">
        <span>←</span> Back to Home
    </a>
    
    <div class="container">
        <div class="header-section">
            <h1>22 Core Memories</h1>
            <div class="subtitle">A gallery of moments that altered my brain chemistry forever 💫</div>
        </div>
        
        <div class="gallery-grid" id="galleryGrid"></div>
        
        <div class="footer-message">
            <p>Each picture tells a story, each memory lives in my heart</p>
            <span>📸 💭 ✨</span>
            
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <span class="close-lightbox" id="closeLightbox">&times;</span>
            <span class="nav-btn prev" id="prevBtn">‹</span>
            <span class="nav-btn next" id="nextBtn">›</span>
            <img src="" alt="" class="lightbox-image" id="lightboxImage">
            <div class="lightbox-caption" id="lightboxCaption"></div>
        </div>
    </div>

    <script>
        const memories = [
            { number: 1, text: "You feeding me when I was sick in high school", emoji: "🍲", image: "image/jom1.jpeg" },
            { number: 2, text: "When you literally forced yourself to meet me in Alexia's to just sit with me in silence because you didn't know what was going on with me", emoji: "🤍", image: "image/homepage1.jpeg" },
            { number: 3, text: "One Thursday in 400l when we both didn't have money and you went out and came back inside with 2 plates of noodles (I honestly don't think I can ever recover from that act of kindness)", emoji: "🍜", image: "image/jom3.jpeg" },
            { number: 4, text: "You donating to wefeed when I complained bitterly that we were very low on funds and the outreach was really close 🥹", emoji: "🤲", image: "image/22reasonswhy.jpeg" },
            { number: 5, text: "When you texted my mums congratulations because Pastor Nath asked us to congratulate our loved ones (you didn't just stop with me🥹)", emoji: "📱", image: "image/jom5.jpeg" },
            { number: 6, text: "My 21st birthday 🥹 I didn't even think we were in a good place and I deserved all that love but you still showed up (I cried that entire week🤣🤣)", emoji: "🎂", image: "image/jom6.jpeg" },
            { number: 7, text: "Hearing you have a full blown conversation with my brother and it wasn't even weird like ah who is this girl really? 🤣", emoji: "🗣️", image: "image/joms.jpeg" },
            { number: 8, text: "Our first summer with the shittiest roommate ever, how you were the calm in the storm, ah I for don run mad that summer if not for you o🤣", emoji: "☀️", image: "image/jom8.jpeg" },
            { number: 9, text: "2023 Summer, going to Katangua market with 2k to buy egusi and bone to last us the week (we don suffer true true 😭😭)", emoji: "🏪", image: "image/jom9.jpeg" },
            { number: 10, text: "Our very first Lagos weekend omg Jomi 🤣🤣🤣😭", emoji: "🌆", image: "image/jom10.jpeg" },
            { number: 11, text: "Our many escapades in alexia's", emoji: "🏃‍♀️", image: "image/jom11.jpeg" },
            { number: 12, text: "Percussion wave 🤣🤣🤣🤣(I don't have to say which one, you should already know 😭😭)", emoji: "🌊", image: "image/jom12.jpeg" },
            { number: 13, text: "Carrying SR luxury on your head in our room in fad, you do pass me sef😂 i love you mhen", emoji: "💼", image: "image/jom13.jpeg" },
            { number: 14, text: "Following ourselves to that office in Eah and bbs to avoid stories that touch 😭🤣", emoji: "🚶‍♀️", image: "image/selfie.jpeg" },
            { number: 15, text: "Just knowing that you'll get all these things I'm coding is altering my brain chemistry sef 🤣", emoji: "💻", image: "image/jom15.jpeg" },
            { number: 16, text: "Announcing me to the world any chance you get🤭 your stories, TikTok", emoji: "📢", image: "image/jom16.jpeg" },
            { number: 17, text: "When you were always sending me the food you cooked in your house", emoji: "🍳", image: "image/brithdaywishes.jpeg" },
            { number: 18, text: "When you borrowed me over 100k because I mentioned how I didn't want to be stranded and put gift in the reference because you were scared of tax ode 🤣🤣", emoji: "💰", image: "image/bg3.jpeg" },
            { number: 19, text: "When you randomly sent money to my favourite banana bread vendor as gift voucher so I can order it whenever I want", emoji: "🍌", image: "image/us.jpeg" },
            { number: 20, text: "When you carried one of my godchildren and she slept off in your arms", emoji: "👶", image: "image/jom20.jpeg" },
            { number: 21, text: "How you always come to gist me about your men and laugh at yourself before I even get the chance to laugh at you 😭🤣", emoji: "😂", image: "image/jom21.jpeg" },
            { number: 22, text: "Recording candid videos of me 🥹❤️", emoji: "📹", image: "image/jom22.jpeg" }
        ];

        let currentLightboxIndex = 0;

        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            
            memories.forEach((memory, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.index = index;
                
                card.innerHTML = `
                    <div class="card-image">
                        <img src="${memory.image}" alt="Memory ${memory.number}" loading="lazy">
                        <div class="card-overlay"></div>
                    </div>
                    <div class="memory-number">${memory.number.toString().padStart(2, '0')}</div>
                    <div class="memory-content">
                        <div class="memory-text">${memory.text}</div>
                        <div class="memory-emoji">${memory.emoji}</div>
                    </div>
                `;
                
                card.addEventListener('click', () => openLightbox(index));
                grid.appendChild(card);
            });
        }

        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightboxImage');
        const lightboxCaption = document.getElementById('lightboxCaption');
        const closeLightbox = document.getElementById('closeLightbox');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        function openLightbox(index) {
            currentLightboxIndex = index;
            updateLightbox();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function updateLightbox() {
            const memory = memories[currentLightboxIndex];
            lightboxImage.src = memory.image;
            lightboxImage.alt = `Memory ${memory.number}`;
            lightboxCaption.innerHTML = `${memory.number}. ${memory.text} ${memory.emoji}`;
        }

        function closeLightboxFunc() {
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function nextImage() {
            currentLightboxIndex = (currentLightboxIndex + 1) % memories.length;
            updateLightbox();
        }

        function prevImage() {
            currentLightboxIndex = (currentLightboxIndex - 1 + memories.length) % memories.length;
            updateLightbox();
        }

        closeLightbox.addEventListener('click', closeLightboxFunc);
        nextBtn.addEventListener('click', nextImage);
        prevBtn.addEventListener('click', prevImage);

        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                closeLightboxFunc();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'Escape') closeLightboxFunc();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        document.querySelectorAll('.floating-frames span').forEach((span) => {
            span.style.animationDuration = `${10 + Math.random() * 15}s`;
        });

        renderGallery();
    </script>
</body>
</html>
